name: Build YouProEXTRA IPA
on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "URL to the decrypted IPA file"
        default: ""
        required: true
        type: string
        
      display_name:
        description: "App Name (Optional)"
        default: "YouTube"
        required: true
        type: string

      bundle_id:
        description: "Bundle ID (Optional)"
        default: "com.google.ios.youtube"
        required: true
        type: string

      demc:
        description: "Integrate DontEatMyContent"
        default: true
        required: false
        type: boolean

      ytvid:
        description: "Integrate YTVideoErrorAlert"
        default: true
        required: false
        type: boolean

      # volboost:
      #   description: "Integrate VolumeBoostYT (Require iOS 16+)"
      #   default: true
      #   required: false
      #   type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build YouProEXTRA IPA
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Hide Sensitive Inputs
        uses: levibostian/action-hide-sensitive-inputs@v1
        with:
          exclude_inputs: bundle_id,display_name,demc,ytvid
          
      - name: Download and Validate IPA
        run: |
          wget "${{ inputs.ipa_url }}" --quiet --no-verbose -O youtube.ipa

          file_type=$(file --mime-type -b youtube.ipa)

          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Validation failed: The downloaded file is not a valid IPA. Detected type: $file_type."
            exit 1
          fi

      - name: Get YouTube Version 
        run: |
          unzip -q youtube.ipa -d ytextracted
          echo "YT_VERSION=$(grep -A 1 '<key>CFBundleVersion</key>' ytextracted/Payload/YouTube.app/Info.plist | grep '<string>' | awk -F'[><]' '{print $3}')" >> $GITHUB_ENV

      - name: Install Dependencies
        run: brew install make ldid swiftlint

      - name: Set PATH Environment Variables
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: theos
          key: ${{ runner.os }}-theos-v3
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: Cache iOS SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos/sdks
          key: ${{ runner.os }}-ios-sdk-18.6-v2
          restore-keys: |
            ${{ runner.os }}-ios-sdk-

      - name: Clone Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 --recurse-submodules https://github.com/theos/theos.git
           
      - name: Download iOS SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          git clone --quiet --depth=1 -n --filter=tree:0 https://github.com/Tonwalter888/iOS-SDKs.git
          cd iOS-SDKs
          git sparse-checkout set --no-cone iPhoneOS18.6.sdk
          git checkout
          mkdir -p $THEOS/sdks
          mv *.sdk $THEOS/sdks

      - name: Install cyan and tbd
        run: |
          pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
          wget --quiet --no-verbose "https://github.com/inoahdev/tbd/releases/download/2.2/tbd-mac" -O /usr/local/bin/tbd
          chmod +x /usr/local/bin/tbd 
          
      - name: Clone Open in YouTube (Safari Extension)
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/BillyCurtis/OpenYouTubeSafariExtension.git
          cd OpenYouTubeSafariExtension
          git sparse-checkout set --no-cone OpenYouTubeSafariExtension.appex
          git checkout
          mv *.appex ${{ github.workspace }}

      - name: Clone YouTubeHeader
        run: |
          if [ -d "$THEOS/include/YouTubeHeader" ]; then
            rm -rf "$THEOS/include/YouTubeHeader"
          fi
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouTubeHeader.git "$THEOS/include/YouTubeHeader"
          
          if [ "${{ inputs.demc }}" = "true" ]; then
            rm -rf "$THEOS/include/YTHeaders"
            cp -r "$THEOS/include/YouTubeHeader" "$THEOS/include/YTHeaders"
          fi

      - name: Clone PSHeader
        run: |
          if [ -d "$THEOS/include/PSHeader" ]; then
            rm -rf "$THEOS/include/PSHeader"
          fi
          git clone --quiet --depth=1 https://github.com/PoomSmart/PSHeader.git "$THEOS/include/PSHeader"

      - name: Get latest commit hashes for all tweaks
        id: tweak_hashes
        run: |
          echo "youpip=$(git ls-remote https://github.com/PoomSmart/YouPiP.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "ytuhd=$(git ls-remote https://github.com/Tonwalter888/YTUHD.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "ryd=$(git ls-remote https://github.com/PoomSmart/Return-YouTube-Dislikes.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "yougroupsettings=$(git ls-remote https://github.com/PoomSmart/YouGroupSettings.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "ytvideooverlay=$(git ls-remote https://github.com/PoomSmart/YTVideoOverlay.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "alderis=$(git ls-remote https://github.com/hbang/Alderis.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "ytabconfig=$(git ls-remote https://github.com/PoomSmart/YTABConfig.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "youspeed=$(git ls-remote https://github.com/PoomSmart/YouSpeed.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "youmute=$(git ls-remote https://github.com/PoomSmart/YouMute.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "youloop=$(git ls-remote https://github.com/bhackel/YouLoop.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "youtweaks=$(git ls-remote https://github.com/fosterbarnes/YTweaks.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "yougetcaption=$(git ls-remote https://github.com/PoomSmart/YouGetCaption.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "ytflags=$(git ls-remote https://github.com/Tonwalter888/YTFlags.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "iamyoutube=$(git ls-remote https://github.com/PoomSmart/IAmYouTube.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "demc=$(git ls-remote https://github.com/therealFoxster/DontEatMyContent.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "ytvideoerroralert=$(git ls-remote https://github.com/PoomSmart/YTVideoErrorAlert.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "youshare=$(git ls-remote https://github.com/Tonwalter888/YouShare.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "gonerino=$(git ls-remote https://github.com/castdrian/Gonerino.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "youslider=$(git ls-remote https://github.com/PoomSmart/YouSlider.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "youchoosequality=$(git ls-remote https://github.com/PoomSmart/YouChooseQuality.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "ytsilentvote=$(git ls-remote https://github.com/PoomSmart/YTSilentVote.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
          
          {
            echo "youpip:${{ steps.tweak_hashes.outputs.youpip || '0' }}"
            echo "ytuhd:${{ steps.tweak_hashes.outputs.ytuhd || '0' }}"
            echo "ryd:${{ steps.tweak_hashes.outputs.ryd || '0' }}"
            echo "yougroupsettings:${{ steps.tweak_hashes.outputs.yougroupsettings || '0' }}"
            echo "ytvideooverlay:${{ steps.tweak_hashes.outputs.ytvideooverlay || '0' }}"
            echo "alderis:${{ steps.tweak_hashes.outputs.alderis || '0' }}"
            echo "ytabconfig:${{ steps.tweak_hashes.outputs.ytabconfig || '0' }}"
            echo "youspeed:${{ steps.tweak_hashes.outputs.youspeed || '0' }}"
            echo "youmute:${{ steps.tweak_hashes.outputs.youmute || '0' }}"
            echo "youloop:${{ steps.tweak_hashes.outputs.youloop || '0' }}"
            echo "youtweaks:${{ steps.tweak_hashes.outputs.youtweaks || '0' }}"
            echo "yougetcaption:${{ steps.tweak_hashes.outputs.yougetcaption || '0' }}"
            echo "ytflags:${{ steps.tweak_hashes.outputs.ytflags || '0' }}"
            echo "iamyoutube:${{ steps.tweak_hashes.outputs.iamyoutube || '0' }}"
            echo "demc:${{ steps.tweak_hashes.outputs.demc || '0' }}"
            echo "ytvideoerroralert:${{ steps.tweak_hashes.outputs.ytvideoerroralert || '0' }}"
            echo "youshare:${{ steps.tweak_hashes.outputs.youshare || '0' }}"
            echo "gonerino:${{ steps.tweak_hashes.outputs.gonerino || '0' }}"
            echo "youslider:${{ steps.tweak_hashes.outputs.youslider || '0' }}"
            echo "youchoosequality:${{ steps.tweak_hashes.outputs.youchoosequality || '0' }}"
            echo "ytsilentvote:${{ steps.tweak_hashes.outputs.ytsilentvote || '0' }}"
          } > tweak_hashes.txt

      - name: Cache All Tweaks
        id: cache_tweaks
        uses: actions/cache@v4
        with:
          path: |
            YouPiP
            YTUHD
            Return-YouTube-Dislikes
            YouGroupSettings
            YTVideoOverlay
            YTABConfig
            YouSpeed
            YouMute
            YouLoop
            Alderis
            YTweaks
            YouGetCaption
            YTFlags
            IAmYouTube
            DontEatMyContent
            YTVideoErrorAlert
            YouShare
            Gonerino
            YouSlider
            YouChooseQuality
            YTSilentVote
          key: ${{ runner.os }}-tweaks-v2-demc${{ inputs.demc }}-ytvid${{ inputs.ytvid }}-${{ hashFiles('tweak_hashes.txt') || 'nohash' }}
          restore-keys: |
            ${{ runner.os }}-tweaks-v2-demc${{ inputs.demc }}-ytvid${{ inputs.ytvid }}-

      - name: Clone YouPiP
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouPiP.git
    
      - name: Clone YTUHD
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/Tonwalter888/YTUHD.git
           
      - name: Clone Return-YouTube-Dislikes
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/Return-YouTube-Dislikes.git

      - name: Clone YouGroupSettings
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouGroupSettings.git
           
      - name: Clone YTVideoOverlay
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTVideoOverlay.git
          
      - name: Clone YTABConfig
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTABConfig.git

      - name: Clone YouSpeed
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouSpeed.git

      - name: Clone DontEatMyContent
        if: ${{ inputs.demc && steps.cache_tweaks.outputs.cache-hit != 'true' }}
        run: git clone --quiet --depth=1 https://github.com/therealFoxster/DontEatMyContent.git

      - name: Clone YouMute
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouMute.git
    
      - name: Clone YouLoop
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/bhackel/YouLoop.git

      - name: Clone Alderis
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/hbang/Alderis.git

      - name: Clone YouSlider
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouSlider.git

      - name: Clone YouChooseQuality
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouChooseQuality.git

      - name: Clone YTSilentVote
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTSilentVote.git

      - name: Clone YouShare
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/Tonwalter888/YouShare.git

      - name: Clone Gonerino
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/castdrian/Gonerino.git

      - name: Clone YTweaks
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/fosterbarnes/YTweaks.git

      - name: Clone YouGetCaption
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouGetCaption.git
        
      - name: Clone YTFlags
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/Tonwalter888/YTFlags.git

      - name: Clone IAmYouTube
        if: steps.cache_tweaks.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/IAmYouTube.git

      - name: Clone YTVideoErrorAlert
        if: ${{ inputs.ytvid && steps.cache_tweaks.outputs.cache-hit != 'true' }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTVideoErrorAlert.git

      # - name: Clone VolumeBoostYT
      #   if: ${{ inputs.volboost }}
      #   run: git clone --quiet --depth=1 https://github.com/VasirakCalgux/VolumeBoostYT.git
        
      - name: Build YouPiP
        run: |
          if [ ! -d "YTVideoOverlay" ]; then
            echo "Error: YTVideoOverlay folder not found!"
            exit 1
          fi
          
          cd YouPiP
          ln -sfn ../YTVideoOverlay YTVideoOverlay
          
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youpip.deb

      - name: Build YTUHD
        run: |
          cd YTUHD
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytuhd.deb

      - name: Build Return-YouTube-Dislikes
        run: |
          cd Return-YouTube-Dislikes
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ryd.deb

      - name: Build YouGroupSettings
        run: |
          cd YouGroupSettings
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ygs.deb

      - name: Build YTVideoOverlay
        run: |
          cd YTVideoOverlay
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytvo.deb

      - name: Build YTABConfig
        run: |
          cd YTABConfig
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytabconfig.deb

      - name: Build YouSpeed
        run: |
          cd YouSpeed
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youspeed.deb

      - name: Build DontEatMyContent
        if: ${{ inputs.demc }}
        run: |
          cd DontEatMyContent
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/demc.deb

      - name: Build YouMute
        run: |
          cd YouMute
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ym.deb

      - name: Build YouLoop
        run: |
          cd YouLoop
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youloop.deb

      - name: Build YouSlider
        run: |
          cd YouSlider
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youslider.deb

      - name: Build Alderis
        run: |
          cd Alderis
          make clean package DEBUG=0 FINALPACKAGE=1 ARCHS=arm64
          mv packages/*.deb ${{ github.workspace }}/alderis.deb

      - name: Build YouChooseQuality
        run: |
          cd YouChooseQuality
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youchoose.deb

      - name: Build YTSilentVote
        run: |
          cd YTSilentVote
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytnovote.deb  

      - name: Build YouShare
        run: |
          cd YouShare
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youshare.deb
          
      - name: Build Gonerino
        run: |
          cd Gonerino
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/gonerino.deb

      - name: Build YouGetCaption
        run: |
          cd YouGetCaption
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ygc.deb

      - name: Build YTweaks
        run: |
          cd YTweaks
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytweaks.deb

      - name: Build YTFlags
        run: |
          cd YTFlags
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytflags.deb
          

      - name: Build YTVideoErrorAlert
        if: ${{ inputs.ytvid }}
        run: |
          cd YTVideoErrorAlert
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytvideoerror.deb

      # - name: Build VolumeBoostYT
      #   if: ${{ inputs.volboost }}
      #   run: |
      #     cd VolumeBoostYT
      #     make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless ARCHS=arm64
      #     mv packages/*.deb ${{ github.workspace }}/volboostyt.deb
          
      - name: Inject Tweaks Into IPA
        run: |
          tweaks="OpenYouTubeSafariExtension.appex"

          for f in *.deb; do
            tweaks="$tweaks $f"
          done
          
          cyan -i youtube.ipa -o YouProEXTRA.ipa -uwef $tweaks -n "${{ inputs.display_name }}" -b ${{ inputs.bundle_id }}

      - name: Create a Draft Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: youproextra${{ github.run_number }}
          name: YouProEXTRA (${{ github.run_number }}) 
          files: YouProEXTRA.ipa
          draft: true

      - name: Job Summary - Build Complete
        run: |
          echo -e '### 🛠️ YouProEXTRA IPA Build Complete!' >> $GITHUB_STEP_SUMMARY

      - name: Job Summary - Output the Draft Release Link
        run: |
          echo -e '### 🚀 Draft Release\n\nDraft release has been created successfully! You can view your release here: https://github.com/${{ github.repository }}/releases' >> $GITHUB_STEP_SUMMARY
